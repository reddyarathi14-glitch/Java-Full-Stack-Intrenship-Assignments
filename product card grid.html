<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

img {
  width: 100%;
}

button {
  background: green;
  color: white;
  padding: 8px;
  border: none;
}

/* Tablet */
@media(max-width:900px){
  .grid {
    grid-template-columns: repeat(2,1fr);
  }
}

/* Mobile */
@media(max-width:600px){
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="grid">
  <!-- 6 Cards -->
  <div class="card"><img src="https://via.placeholder.com/150"><h3>Product</h3><p>$10</p><button>Buy</button></div>
  <div class="card"><img src="https://via.placeholder.com/150"><h3>Product</h3><p>$20</p><button>Buy</button></div>
  <div class="card"><img src="https://via.placeholder.com/150"><h3>Product</h3><p>$30</p><button>Buy</button></div>
  <div class="card"><img src="https://via.placeholder.com/150"><h3>Product</h3><p>$40</p><button>Buy</button></div>
  <div class="card"><img src="https://via.placeholder.com/150"><h3>Product</h3><p>$50</p><button>Buy</button></div>
  <div class="card"><img src="https://via.placeholder.com/150"><h3>Product</h3><p>$60</p><button>Buy</button></div>
</div>

</body>
</html>
