<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            padding: 10px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
        }

        @media (min-width: 600px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        @media (min-width: 900px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            }
        }

        @media (min-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            }
        }
    </style>
</head>
<body>

    <div class="gallery">
        <img src="https://picsum.photos/id/1015/600/400" alt="">
        <img src="https://picsum.photos/id/1016/600/400" alt="">
        <img src="https://picsum.photos/id/1018/600/400" alt="">
        <img src="https://picsum.photos/id/1020/600/400" alt="">
        <img src="https://picsum.photos/id/1024/600/400" alt="">
        <img src="https://picsum.photos/id/1027/600/400" alt="">
    </div>

</body>
</html>
