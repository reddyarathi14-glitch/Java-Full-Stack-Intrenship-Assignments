<!DOCTYPE html>
<html>
<head>
    <title>Full Centered Box</title>
    <style>
        /* Full height container */
        body {
            height: 100vh; /* full screen height */
            margin: 0;

            /* Flexbox */
            display: flex;
            justify-content: center; /* horizontal center */
            align-items: center;    /* vertical center */

            background-color: #f2f2f2;
        }

        .box {
            width: 300px;
            height: 150px;
            background-color: lightcoral;

            /* Center text inside box */
            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 20px;
            font-weight: bold;
            color: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="box">
        Centered Box
    </div>

</body>
</html>
