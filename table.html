<!DOCTYPE html>
<html>
<head>
    <title>Table Example</title>
    <style>
        table {
            border-collapse: collapse;
            width: 400px;
        }
        table, th, td {
            border: 2px solid black;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
    </tr>
    <tr>
        <td>John</td>
        <td>30</td>
        <td rowspan="3">New York</td>
    </tr>
    <tr>
        <td>Jane</td>
        <td>25</td>
    </tr>
    <tr>
        <td>Doe</td>
        <td>35</td>
    </tr>
</table>

</body>
</html>
