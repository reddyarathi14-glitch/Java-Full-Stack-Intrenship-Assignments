<!DOCTYPE html>
<html>
<head>
    <title>School Notice</title>
    <style>
        .center { text-align: center; }
        .right { text-align: right; }
        .left { text-align: left; }
        .justify { text-align: justify; }
        .highlight { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h1 class="center">ABC School</h1>
    <p class="right">Date: 30 March 2026</p>

    <p class="justify">
        All students are informed that the annual exams will begin from next week.
        Please prepare well and attend all exams on time.
    </p>

    <p class="center highlight">
        Important: Bring your ID card daily.
    </p>

    <footer class="left">
        Principal Office
    </footer>

</body>
</html>
