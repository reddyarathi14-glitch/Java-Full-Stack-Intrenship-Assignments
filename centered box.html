<!DOCTYPE html>
<html>
<head>
    <title>Centered Box</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .box {
            width: 300px;
            height: 150px;
            background-color: lightblue;
            
            /* Center box horizontally */
            margin: 100px auto;

            /* Center text inside */
            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box">
        hello Arathi!
    </div>

</body>
</html>
