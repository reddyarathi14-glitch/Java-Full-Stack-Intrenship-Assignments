<!DOCTYPE html>
<html>
<head>
    <title>Basic Page</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
        }
    </style>
</head>
<body>

<!-- Table -->
<table>
    <tr>
        <th>Name</th>
        <th>Age</th>
    </tr>
    <tr>
        <td>Thrisha</td>
        <td>21</td>
    </tr>
    <tr>
        <td>Manasa</td>
        <td>19</td>
    </tr>
</table>

<br>

<!-- Ordered List -->
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<!-- Unordered List -->
<ul>
    <li>Java</li>
    <li>Python</li>
</ul>

<!-- Text Content -->
<p><b>HTML</b><br>
Hyper text markup language</p>

<p><b>CSS</b><br>
Cascading Style Sheets</p>

<p><b>JavaScript</b><br>
Programming language for web</p>

</body>
</html>
